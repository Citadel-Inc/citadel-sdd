name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect Phase A
        id: phase
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not present yet — Phase A scaffolding pending; skipping build/check/test."
          fi

      - uses: actions/setup-node@v6
        if: steps.phase.outputs.ready == 'true'
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        if: steps.phase.outputs.ready == 'true'
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        if: steps.phase.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.phase.outputs.ready == 'true'
        run: bun run build

      - name: Lint and format check
        if: steps.phase.outputs.ready == 'true'
        run: bun run check

      - name: Unit tests with coverage
        if: steps.phase.outputs.ready == 'true'
        run: bun run test:coverage

      - name: Assert Node.js version
        if: steps.phase.outputs.ready == 'true'
        run: node -e "const v=+process.version.slice(1).split('.')[0]; if(v<22)process.exit(1)"

  citadel-parity:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect Phase B
        id: phase
        run: |
          if [ -f package.json ] && [ -d src/lint ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Phase B lint port pending; skipping citadel parity test."
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.phase.outputs.ready == 'true'
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        if: steps.phase.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Clone citadel (shallow, public-fixtures path)
        if: steps.phase.outputs.ready == 'true'
        run: |
          mkdir -p .parity
          # Citadel repo is private; CI requires a deploy key or PAT exposed as
          # CITADEL_PARITY_TOKEN secret. Skip cleanly when absent so OSS forks
          # are not blocked.
          if [ -z "${{ secrets.CITADEL_PARITY_TOKEN }}" ]; then
            echo "::warning::CITADEL_PARITY_TOKEN not configured; skipping parity test."
            exit 0
          fi
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.CITADEL_PARITY_TOKEN }}@github.com/Rethunk-Tech/citadel.git" \
            .parity/citadel

      - name: Run spec_lint against citadel tree
        if: steps.phase.outputs.ready == 'true'
        run: |
          if [ ! -d .parity/citadel ]; then exit 0; fi
          cd .parity/citadel
          bun run --cwd "$GITHUB_WORKSPACE" lint:citadel-parity
