name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Detect Phase A
      id: phase
      run: |
        if [ -f package.json ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::notice::package.json not present yet — Phase A scaffolding pending; skipping build/check/test."
        fi

    - uses: actions/setup-node@v6
      if: steps.phase.outputs.ready == 'true'
      with:
        node-version: "24"

    - name: Install Bun
      if: steps.phase.outputs.ready == 'true'
      run: |
        curl -fsSL https://bun.sh/install | bash -s -- "bun-v1.3.13"
        echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

    - name: Install dependencies
      if: steps.phase.outputs.ready == 'true'
      run: bun install --frozen-lockfile

    - name: Build
      if: steps.phase.outputs.ready == 'true'
      run: bun run build

    - name: Lint and format check
      if: steps.phase.outputs.ready == 'true'
      run: bun run ci

    - name: Unit tests with coverage
      if: steps.phase.outputs.ready == 'true'
      run: |
        set -o pipefail
        bun run test:coverage 2>&1 | tee /tmp/bun-coverage.txt

    - name: Coverage summary
      if: always() && steps.phase.outputs.ready == 'true'
      run: |
        [[ -f /tmp/bun-coverage.txt ]] || exit 0
        {
          echo "## Coverage"
          echo ""
          echo '```'
          awk '/^[[:space:]]*---/{p=1} p' /tmp/bun-coverage.txt | head -80
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Assert Node.js version
      if: steps.phase.outputs.ready == 'true'
      run: node -e "const v=+process.version.slice(1).split('.')[0]; if(v<22)process.exit(1)"
